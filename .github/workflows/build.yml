name: Build Alout PS3 Browser
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install PS3 SDK
        run: |
          # هذه الخطوة تجلب الأدوات مباشرة وتتجنب مشاكل الحاويات
          docker run --rm -v $(pwd):/src -w /src ps3dev/ps3dev:latest sh -c "make clean && make"

      - name: Upload PKG
        uses: actions/upload-artifact@v3
        with:
          name: Alout-Browser
          path: "*.pkg"
