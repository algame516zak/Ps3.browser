name: بناء PS3 UltraBrowser

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: بناء ملف PKG حقيقي
    runs-on: ubuntu-latest

    steps:

      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: بناء داخل Docker PS3DEV
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            mlafeldt/ps3dev \
            bash -c "
              set -e

              export PS3DEV=/usr/local/ps3dev
              export PSL1GHT=\$PS3DEV
              export PATH=\$PS3DEV/bin:\$PS3DEV/ppu/bin:\$PS3DEV/spu/bin:\$PATH

              echo '=== المترجم المتاح ==='
              ls \$PS3DEV/ppu/bin/ | grep -E 'g\+\+|gcc' || true

              # تحديد اسم المترجم الصحيح
              if [ -f \"\$PS3DEV/ppu/bin/ppu-lv2-g++\" ]; then
                CXX_COMPILER=ppu-lv2-g++
                CC_COMPILER=ppu-lv2-gcc
                STRIP_TOOL=ppu-lv2-strip
              elif [ -f \"\$PS3DEV/ppu/bin/powerpc64-ps3-elf-g++\" ]; then
                CXX_COMPILER=powerpc64-ps3-elf-g++
                CC_COMPILER=powerpc64-ps3-elf-gcc
                STRIP_TOOL=powerpc64-ps3-elf-strip
              else
                echo 'خطأ: لم يُعثر على المترجم!'
                ls \$PS3DEV/ppu/bin/
                exit 1
              fi

              echo \"المترجم: \$CXX_COMPILER\"

              # تعديل Makefile باسم المترجم الصحيح
              sed -i \"s|ppu-lv2-g++|\$CXX_COMPILER|g\"    Makefile
              sed -i \"s|ppu-lv2-gcc|\$CC_COMPILER|g\"     Makefile
              sed -i \"s|ppu-lv2-strip|\$STRIP_TOOL|g\"    Makefile
              sed -i \"s|powerpc64-ps3-elf-g++|\$CXX_COMPILER|g\" Makefile
              sed -i \"s|powerpc64-ps3-elf-gcc|\$CC_COMPILER|g\"  Makefile
              sed -i \"s|powerpc64-ps3-elf-strip|\$STRIP_TOOL|g\" Makefile

              mkdir -p build pkg/USRDIR

              echo '=== بدء البناء ==='
              make 2>&1

              echo '=== إنشاء PKG ==='
              make pkg 2>&1

              echo '=== الملفات الناتجة ==='
              ls -lh build/
            "

      - name: رفع ملفات البناء
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PS3UltraBrowser-v1.0.0-Build${{ github.run_number }}
          path: |
            build/ps3browser.elf
            build/ps3browser.self
            build/ps3browser.pkg
            pkg/PARAM.SFO
            pkg/ICON0.PNG
            pkg/USRDIR/EBOOT.BIN
          if-no-files-found: warn
          retention-days: 90

      - name: ملخص نهائي
        if: always()
        run: |
          echo "╔══════════════════════════════════╗"
          echo "║   PS3 UltraBrowser - النتيجة    ║"
          echo "╠══════════════════════════════════╣"
          for f in build/ps3browser.elf build/ps3browser.self build/ps3browser.pkg; do
            if [ -f "$f" ]; then
              echo "║ ✅ $(basename $f): $(du -h $f | cut -f1)"
            else
              echo "║ ❌ $(basename $f): غير موجود"
            fi
          done
          echo "╚══════════════════════════════════╝"
