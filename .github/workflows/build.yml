name: Build PS3 UltraBrowser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # تحديث إلى v4

      - name: Install PSL1GHT SDK
        run: |
          docker pull bucanero/ps3dev:latest
          
      - name: Compile Project
        run: |
          # تشغيل الماك فايل الذي يبحث في مجلد Source
          docker run --rm -v $(pwd):/src -w /src bucanero/ps3dev:latest make

      - name: Upload PKG Artifact
        uses: actions/upload-artifact@v4 # 👈 هذا هو التعديل المطلوب (تغيير v3 إلى v4)
        with:
          name: PS3-UltraBrowser-Package
          path: ultrabrowser.pkg
