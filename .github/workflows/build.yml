name: Build PS3 UltraBrowser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    # استخدام الحاوية الرسمية والمجربة 100%
    container: ghcr.io/ps3dev/ps3dev:master

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          apk add --no-cache make git g++
          
      - name: Compile Project
        run: |
          # التأكد من تنظيف الملفات القديمة وبدء البناء
          make clean
          make

      - name: Upload PKG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3-UltraBrowser-Package
          path: ultrabrowser.pkg
