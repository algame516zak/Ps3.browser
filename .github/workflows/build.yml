name: Build PS3 UltraBrowser (mlafeldt Edition)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    # نستخدم الصورة التي وجدتها في بحثك الذكي
    container: mlafeldt/ps3dev:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Project
        run: |
          # الدخول لمجلد Source (S كبيرة كما في رسمتك)
          cd Source
          
          # إعداد البيئة (هذه الصورة عادة تضع الأدوات في هذا المسار)
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=$PS3DEV/psl1ght
          export PATH=$PS3DEV/bin:$PS3DEV/ppu/bin:$PATH
          
          echo "🔨 يبدأ البناء باستخدام أدوات mlafeldt..."
          
          # محاولة البناء
          make -f ../Makefile clean || true
          make -f ../Makefile

      - name: Upload Result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PS3-UltraBrowser-mlafeldt
          path: |
            *.pkg
            *.elf
            Source/
