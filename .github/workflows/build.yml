name: PS3 UltraBrowser Auto-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # هذه هي "الخطة السحرية": نستخدم بيئة جاهزة بداخلها كل الأدوات
    container: ghcr.io/ps3dev/ps3dev:latest

    steps:
      - name: تحميل ملفاتك الـ 11
        uses: actions/checkout@v4

      - name: بناء المشروع (Compilation)
        run: |
          # الدخول لمجلد Source (S كبيرة كما في رسمتك)
          cd Source
          
          echo "🔨 جاري تحويل الملفات الـ 11 إلى تطبيق PS3..."
          
          # أمر البناء المباشر (يجمع كل الملفات .cpp مرة واحدة)
          ppu-lv2-g++ -O2 -Wall *.cpp -o ../browser.elf \
            -I. -I/usr/local/ps3dev/psl1ght/include \
            -L/usr/local/ps3dev/psl1ght/lib \
            -lpsl1ght -lnet -lsysmodule -bio
          
          echo "✅ تم إنشاء ملف browser.elf بنجاح"

      - name: تحويل الملف إلى PKG
        run: |
          # تحويل الملف الناتج لملف يفهمه البلايستيشن
          if [ -f browser.elf ]; then
            make_self browser.elf EBOOT.BIN
            echo "📦 الملف جاهز للنقل!"
          fi

      - name: رفع النتائج لهاتفك
        uses: actions/upload-artifact@v4
        with:
          name: UltraBrowser-Output
          path: |
            browser.elf
            EBOOT.BIN
            *.pkg
