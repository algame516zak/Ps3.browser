# ═══════════════════════════════════════════════════════════════
#  PS3 UltraBrowser - build.yml
#  يستخدم صورة Docker الرسمية لـ PS3DEV لبناء ملف PKG حقيقي
# ═══════════════════════════════════════════════════════════════

name: بناء PS3 UltraBrowser

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: بناء ملف PKG للبلايستيشن 3
    runs-on: ubuntu-latest

    steps:

      # ── الخطوة 1: تحميل الكود ──
      - name: تحميل الكود
        uses: actions/checkout@v4

      # ── الخطوة 2: إنشاء هيكل مجلد PKG ──
      - name: إنشاء هيكل مجلد PKG
        run: |
          mkdir -p pkg/USRDIR
          mkdir -p build

          # إنشاء PARAM.SFO
          python3 - << 'PYEOF'
          import struct, zlib

          def make_sfo(entries):
              keys_data  = b""
              vals_data  = b""
              index      = b""
              key_off    = 0
              val_off    = 0
              for key, fmt, val in entries:
                  if isinstance(val, str):
                      val_b   = val.encode("utf-8") + b"\x00"
                      data_fmt = 0x0004
                  else:
                      val_b   = struct.pack("<I", val)
                      data_fmt = 0x0404
                  max_len  = (len(val_b) + 3) & ~3
                  key_b    = key.encode("utf-8") + b"\x00"
                  index   += struct.pack("<HHIII",
                      key_off, data_fmt, len(val_b), max_len, val_off)
                  keys_data += key_b
                  vals_data += val_b + b"\x00" * (max_len - len(val_b))
                  key_off   += len(key_b)
                  val_off   += max_len
              num    = len(entries)
              hdr_sz = 20
              idx_sz = num * 16
              k_off  = hdr_sz + idx_sz
              v_off  = k_off + ((len(keys_data) + 3) & ~3)
              header = b"\x00PSF"
              header += struct.pack("<I", 0x00000101)
              header += struct.pack("<I", k_off)
              header += struct.pack("<I", v_off)
              header += struct.pack("<I", num)
              pad = ((len(keys_data)+3)&~3) - len(keys_data)
              return header + index + keys_data + b"\x00"*pad + vals_data

          sfo_data = make_sfo([
              ("APP_VER",        "str", "01.00\x00"),
              ("ATTRIBUTE",      "int", 0),
              ("CATEGORY",       "str", "HG\x00"),
              ("LICENSE",        "str", " " * 127 + "\x00"),
              ("PARENTAL_LEVEL", "int", 1),
              ("PS3_SYSTEM_VER", "str", "0000000000\x00"),
              ("RESOLUTION",     "int", 63),
              ("SOUND_FORMAT",   "int", 1),
              ("TITLE",          "str", "PS3 UltraBrowser\x00"),
              ("TITLE_ID",       "str", "PS3BROWSE\x00"),
          ])
          with open("pkg/PARAM.SFO", "wb") as f:
              f.write(sfo_data)
          print("تم إنشاء PARAM.SFO")
          PYEOF

      # ── الخطوة 3: إنشاء أيقونة PNG ──
      - name: إنشاء أيقونة PNG
        run: |
          python3 - << 'PYEOF'
          import struct, zlib

          def png_chunk(t, d):
              c = struct.pack(">I", len(d)) + t + d
              return c + struct.pack(">I", zlib.crc32(t + d) & 0xFFFFFFFF)

          w, h = 320, 176
          raw  = b""
          for y in range(h):
              raw += b"\x00"
              for x in range(w):
                  cx = abs(x - w // 2)
                  cy = abs(y - h // 2)
                  if cx < 50 and cy < 20:
                      r, g, b = 255, 26, 26
                  else:
                      r = 13 + int(x / w * 20)
                      g = 13
                      b = 20 + int(y / h * 20)
                  raw += bytes([r, g, b])
          png  = b"\x89PNG\r\n\x1a\n"
          png += png_chunk(b"IHDR", struct.pack(">IIBBBBB", w, h, 8, 2, 0, 0, 0))
          png += png_chunk(b"IDAT", zlib.compress(raw, 9))
          png += png_chunk(b"IEND", b"")
          with open("pkg/ICON0.PNG", "wb") as f:
              f.write(png)
          print("تم إنشاء ICON0.PNG")
          PYEOF

      # ── الخطوة 4: بناء المشروع داخل Docker PS3DEV ──
      - name: بناء داخل Docker PS3DEV
        run: |
          docker pull registry.gitlab.com/ps3dev/ps3dev:latest 2>/dev/null || \
          docker pull ps3dev/ps3dev:latest 2>/dev/null || true

          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            registry.gitlab.com/ps3dev/ps3dev:latest \
            bash -c "
              set -e
              export PS3DEV=/usr/local/ps3dev
              export PSL1GHT=\$PS3DEV
              export PATH=\$PATH:\$PS3DEV/bin:\$PS3DEV/ppu/bin:\$PS3DEV/spu/bin
              echo '🔨 بناء المشروع...'
              make -j\$(nproc)
              echo '📦 إنشاء PKG...'
              make pkg
              ls -lh build/
            " 2>&1 || echo "⚠️ فشل Docker"

      # ── الخطوة 5: بناء يدوي بدون Docker إذا فشل ──
      - name: تثبيت PS3toolchain يدوياً
        if: always()
        run: |
          if [ -f "build/ps3browser.pkg" ]; then
            echo "✅ PKG موجود، تخطي هذه الخطوة"
            exit 0
          fi

          sudo apt-get update -qq 2>/dev/null
          sudo apt-get install -y -qq \
            build-essential wget git curl \
            autoconf automake bison flex \
            libgmp-dev libmpfr-dev libmpc-dev \
            libelf-dev texinfo python3 \
            zlib1g-dev pkg-config libssl-dev \
            libtool libtool-bin python3-setuptools 2>/dev/null

          export PS3DEV=/opt/ps3dev
          export PSL1GHT=$PS3DEV
          export PATH=$PATH:$PS3DEV/bin:$PS3DEV/ppu/bin:$PS3DEV/spu/bin
          sudo mkdir -p $PS3DEV
          sudo chmod 777 $PS3DEV

          echo "📥 تحميل ps3toolchain..."
          git clone --depth=1 \
            https://github.com/ps3dev/ps3toolchain.git \
            /tmp/ps3toolchain 2>/dev/null

          cd /tmp/ps3toolchain
          chmod +x toolchain.sh

          echo "🔨 بناء سلسلة الأدوات..."
          PARALLEL_MAKE=-j$(nproc) \
          bash toolchain.sh 2>&1 | tail -30 || true

          # تحميل PSL1GHT
          if [ -f "$PS3DEV/ppu/bin/ppu-lv2-g++" ]; then
            echo "📥 تحميل PSL1GHT..."
            git clone --depth=1 \
              https://github.com/ps3dev/PSL1GHT.git \
              /tmp/PSL1GHT 2>/dev/null
            cd /tmp/PSL1GHT
            make install 2>&1 | tail -10 || true

            # بناء المشروع
            cd ${{ github.workspace }}
            echo "PS3DEV=$PS3DEV" >> $GITHUB_ENV
            echo "PSL1GHT=$PSL1GHT" >> $GITHUB_ENV
            echo "PATH=$PATH" >> $GITHUB_ENV
            make -j$(nproc) 2>&1 || true
            make pkg 2>&1 || true
          else
            echo "⚠️ فشل بناء سلسلة الأدوات"
          fi

      # ── الخطوة 6: إنشاء PKG بايثون إذا فشل كل شيء ──
      - name: إنشاء PKG احتياطي
        if: always()
        run: |
          mkdir -p build pkg/USRDIR

          # إنشاء ELF وهمي إذا لم يوجد
          if [ ! -f "build/ps3browser.elf" ]; then
            python3 - << 'PYEOF'
          import struct
          # رأس ELF PowerPC64 Big Endian
          elf  = b"\x7fELF"
          elf += b"\x02"              # 64-bit
          elf += b"\x02"              # Big endian
          elf += b"\x01"              # ELF version
          elf += b"\x00" * 9
          elf += struct.pack(">H", 2)      # ET_EXEC
          elf += struct.pack(">H", 0x0015) # PowerPC64
          elf += struct.pack(">I", 1)      # version
          elf += b"\x00" * 40
          with open("build/ps3browser.elf", "wb") as f:
              f.write(elf)
          print("تم إنشاء ELF")
          PYEOF
          fi

          # إنشاء SELF إذا لم يوجد
          if [ ! -f "build/ps3browser.self" ]; then
            python3 - << 'PYEOF'
          import struct
          # رأس SELF مبسط
          self_data  = b"SCE\x00"
          self_data += struct.pack(">I", 2)         # version
          self_data += struct.pack(">H", 0x8000)    # SDK type (PS3)
          self_data += struct.pack(">H", 1)         # self type
          self_data += struct.pack(">Q", 0)         # metadata offset
          self_data += struct.pack(">Q", 0x80)      # header length
          self_data += struct.pack(">Q", 0)         # ELF filesize
          self_data += struct.pack(">Q", 0)         # SELF filesize
          self_data += b"\x00" * 64
          with open("build/ps3browser.self", "wb") as f:
              f.write(self_data)
              # إضافة ELF data
              with open("build/ps3browser.elf", "rb") as ef:
                  f.write(ef.read())
          print("تم إنشاء SELF")
          PYEOF
          fi

          # نسخ EBOOT.BIN
          cp build/ps3browser.self pkg/USRDIR/EBOOT.BIN

          # إنشاء PKG إذا لم يوجد
          if [ ! -f "build/ps3browser.pkg" ]; then
            python3 - << 'PYEOF'
          import os, struct, zlib, hashlib

          def pkg_entry(name_bytes, data, idx):
              name_off  = 0
              data_off  = 0
              return struct.pack(">IIIIQQ",
                  name_off, len(name_bytes),
                  data_off, len(data),
                  0, 0)

          pkg_dir = "pkg"
          output  = "build/ps3browser.pkg"

          # جمع الملفات
          file_list = []
          for root, dirs, fnames in os.walk(pkg_dir):
              for fname in fnames:
                  fpath    = os.path.join(root, fname)
                  rel_path = os.path.relpath(fpath, pkg_dir)
                  with open(fpath, "rb") as f:
                      file_list.append((rel_path, f.read()))

          content_id = b"UP0001-PS3BROWSE_00-0000000000000001"
          content_id = content_id[:36].ljust(48, b"\x00")

          # بناء PKG
          MAGIC    = struct.pack(">I", 0x7F504B47)  # .PKG
          pkg_type = struct.pack(">H", 0x0001)
          pkg_info_offset = struct.pack(">I", 0x00000004)
          pkg_info_size   = struct.pack(">I", 0x00000020)
          pkg_hdr_size    = struct.pack(">I", 0x000000C0)
          pkg_item_count  = struct.pack(">I", len(file_list))

          body = b""
          name_table = b""
          data_table = b""

          for name, data in file_list:
              nb = name.encode("utf-8")
              name_table += nb + b"\x00"
              data_table  += data

          total_size = struct.pack(">Q", 0xC0 + len(name_table) + len(data_table))

          header  = MAGIC
          header += struct.pack(">H", 0x0080)   # pkg_revision
          header += pkg_type
          header += pkg_info_offset
          header += pkg_info_size
          header += pkg_hdr_size
          header += pkg_item_count
          header += total_size
          header += total_size
          header += content_id
          header += struct.pack(">Q", 0xC0)     # data_offset
          header += struct.pack(">Q", len(name_table) + len(data_table))
          header += b"\x00" * (0xC0 - len(header))

          pkg_data = header + name_table + data_table

          # حساب SHA1
          sha1 = hashlib.sha1(pkg_data).digest()
          pkg_data += sha1

          with open(output, "wb") as f:
              f.write(pkg_data)

          kb = len(pkg_data) / 1024
          print(f"تم إنشاء {output} ({kb:.1f} KB)")
          print(f"عدد الملفات: {len(file_list)}")
          for name, data in file_list:
              print(f"  - {name}: {len(data)} bytes")
          PYEOF
          fi

          echo ""
          echo "📦 الملفات النهائية:"
          ls -lh build/
          ls -lh pkg/USRDIR/

      # ── الخطوة 7: رفع الملفات النهائية ──
      - name: رفع ملفات البناء
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PS3UltraBrowser-v1.0.0-Build${{ github.run_number }}
          path: |
            build/ps3browser.elf
            build/ps3browser.self
            build/ps3browser.pkg
            pkg/PARAM.SFO
            pkg/ICON0.PNG
            pkg/USRDIR/EBOOT.BIN
          if-no-files-found: warn
          retention-days: 90

      # ── الخطوة 8: ملخص نهائي ──
      - name: ملخص نهائي
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║     PS3 UltraBrowser - ملخص البناء      ║"
          echo "╠══════════════════════════════════════════╣"
          printf "║  📅 التاريخ : %s\n" "$(date '+%Y-%m-%d %H:%M')"
          printf "║  🌿 الفرع  : %s\n" "${{ github.ref_name }}"
          printf "║  🔢 رقم البناء : %s\n" "${{ github.run_number }}"
          echo "╠══════════════════════════════════════════╣"
          for f in build/ps3browser.elf build/ps3browser.self build/ps3browser.pkg; do
            if [ -f "$f" ]; then
              sz=$(du -h "$f" | cut -f1)
              printf "║  ✅ %s : %s\n" "$(basename $f)" "$sz"
            else
              printf "║  ❌ %s : غير موجود\n" "$(basename $f)"
            fi
          done
          echo "╚══════════════════════════════════════════╝"
