name: Build Alout PS3 Browser
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ps3dev/ps3dev:latest
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: |
          make clean
          make
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: Alout-Browser
          path: "*.pkg"
