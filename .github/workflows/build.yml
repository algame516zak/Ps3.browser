name: Build PS3 UltraBrowser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc-ppu g++-ppu binutils-ppu

      - name: Compile Project
        run: |
          # سنحاول البناء باستخدام المترجم المتوفر
          # إذا كان psl1ght غير مثبت، سنقوم بتجربة بناء هيكلية
          make clean
          make

      - name: Upload PKG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3-UltraBrowser-Package
          path: "*.pkg"
