name: Build PS3 UltraBrowser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    # نستخدم الحاوية الرسمية مباشرة في بيئة العمل
    container: ps3dev/ps3dev:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apk add --no-cache make git
          
      - name: Compile Project
        run: |
          # بما أننا داخل الحاوية أصلاً، ننفذ make مباشرة
          make clean
          make

      - name: Upload PKG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3-UltraBrowser-Package
          path: ultrabrowser.pkg
