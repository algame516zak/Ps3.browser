name: Build PS3 UltraBrowser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # استخدام الأكشن الرسمي لمجتمع PS3DEV
      - name: Setup PSL1GHT SDK
        uses: ps3dev/setup-ps3dev@master

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc g++ git

      - name: Compile Project
        run: |
          # تنظيف وبناء المشروع باستخدام الماك فايل في الجذر
          make clean
          make

      - name: Upload PKG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3-UltraBrowser-Package
          path: "*.pkg" # سيبحث عن أي ملف pkg ناتج
