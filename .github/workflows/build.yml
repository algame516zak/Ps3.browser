name: Build PS3 UltraBrowser Final

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # هذه هي الحاوية الرسمية الوحيدة التي تعمل حالياً في 2026
    container: ghcr.io/ps3dev/ps3dev:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Project
        run: |
          # إعداد المسارات الرسمية داخل الحاوية
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=$PS3DEV/psl1ght
          export PATH=$PS3DEV/bin:$PS3DEV/ppu/bin:$PATH
          
          # الدخول لمجلد Source (S كبيرة كما في رسمتك الورقية)
          cd Source
          
          echo "🔨 جاري البناء الرسمي باستخدام PS3DEV SDK..."
          
          # تنظيف وبناء
          make -f ../Makefile clean || true
          make -f ../Makefile

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: PS3-UltraBrowser-Final-PKG
          path: |
            *.pkg
            *.elf
            *.self
